<h1>Grant Training Access</h1>

<p>Client: {{ client.name }} - {{ client.email }}</p>

<form method="post">
    <label>Select Training</label><br>
    <select name="training_id">
        {% for training in trainings %}
            <option value="{{ training.id }}">{{ training.title }} - ${{ training.price }}</option>
        {% endfor %}
    </select><br><br>

    <button type="submit">Grant Access</button>
</form>

<p><a href="/admin/clients">Back to Clients</a></p>
