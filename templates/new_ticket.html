<!DOCTYPE html>
<html>
<head>
    <title>Submit Ticket</title>
</head>
<body>
    <h1>Submit New Ticket</h1>

    <form method="post">
        <label>Subject</label><br>
        <input name="subject" required><br><br>

        <label>Category</label><br>
        <select name="category">
            <option>MRI Training</option>
            <option>CT Training</option>
            <option>PACS Support</option>
            <option>IT Support</option>
            <option>Business Application</option>
            <option>Other</option>
        </select><br><br>

        <label>Priority</label><br>
        <select name="priority">
            <option>Low</option>
            <option>Normal</option>
            <option>High</option>
            <option>Urgent</option>
        </select><br><br>

        <label>Description</label><br>
        <textarea name="description" rows="8" cols="60" required></textarea><br><br>

        <button type="submit">Submit Ticket</button>
    </form>

    <p><a href="/tickets">Back to Tickets</a></p>
</body>
</html>
